<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Yan.Pro — Админ-панель</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0f0f0f;--card:#1a1a1a;--card2:#252525;--green:#00C853;--blue:#2979FF;--red:#F44336;--text:#fff;--text2:#888;--border:#333;--radius:10px}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
a{color:var(--blue);text-decoration:none}
.container{max-width:900px;margin:0 auto;padding:20px}

/* Login */
#loginScreen{display:flex;align-items:center;justify-content:center;min-height:100vh}
.login-box{background:var(--card);border-radius:var(--radius);padding:40px;width:100%;max-width:360px}
.login-box h2{text-align:center;margin-bottom:24px;font-size:20px}
.login-box input{width:100%;padding:12px 16px;background:var(--card2);border:1px solid var(--border);border-radius:var(--radius);color:var(--text);font-size:15px;margin-bottom:12px;outline:none}
.login-box input:focus{border-color:var(--green)}
.login-box button{width:100%;padding:14px;background:var(--green);color:#000;border:none;border-radius:var(--radius);font-size:16px;font-weight:700;cursor:pointer}
.login-box button:active{opacity:.85}
.login-box .error{color:var(--red);font-size:13px;text-align:center;margin-top:8px;display:none}

/* Dashboard */
#dashScreen{display:none}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:16px 0;border-bottom:1px solid var(--border);margin-bottom:20px}
.topbar h1{font-size:18px}
.topbar button{padding:8px 16px;background:var(--card2);border:1px solid var(--border);border-radius:var(--radius);color:var(--text2);font-size:13px;cursor:pointer}
.tabs{display:flex;gap:8px;margin-bottom:20px}
.tab{padding:10px 18px;background:var(--card);border:1px solid var(--border);border-radius:var(--radius);color:var(--text2);font-size:14px;font-weight:600;cursor:pointer}
.tab.active{border-color:var(--green);color:var(--green);background:rgba(0,200,83,.08)}
.tab-content{display:none}.tab-content.active{display:block}

/* Stats */
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;margin-bottom:20px}
.stat{background:var(--card);border-radius:var(--radius);padding:16px;text-align:center}
.stat .num{font-size:28px;font-weight:700;color:var(--green)}
.stat .lbl{font-size:12px;color:var(--text2);margin-top:4px}

/* Table */
table{width:100%;border-collapse:collapse;background:var(--card);border-radius:var(--radius);overflow:hidden}
th,td{padding:10px 14px;text-align:left;font-size:13px;border-bottom:1px solid var(--border)}
th{background:var(--card2);color:var(--text2);font-weight:600;font-size:12px;text-transform:uppercase}
tr:hover{background:rgba(255,255,255,.03)}
.badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:11px;font-weight:600}
.badge-green{background:rgba(0,200,83,.15);color:var(--green)}
.badge-blue{background:rgba(41,121,255,.15);color:var(--blue)}
.badge-red{background:rgba(244,67,54,.15);color:var(--red)}
.badge-gray{background:rgba(136,136,136,.15);color:var(--text2)}

/* Add driver form */
.add-form{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap}
.add-form input,.add-form select{padding:10px 14px;background:var(--card2);border:1px solid var(--border);border-radius:var(--radius);color:var(--text);font-size:14px;outline:none}
.add-form input:focus{border-color:var(--green)}
.add-form button{padding:10px 20px;background:var(--green);color:#000;border:none;border-radius:var(--radius);font-size:14px;font-weight:600;cursor:pointer}
.del-btn{padding:4px 10px;background:rgba(244,67,54,.15);color:var(--red);border:none;border-radius:6px;font-size:12px;cursor:pointer}
</style>
</head>
<body>

<!-- ═══ Login ═══ -->
<div id="loginScreen">
  <div class="login-box">
    <h2>🔧 Yan.Pro Админ</h2>
    <input type="text" id="loginInput" placeholder="Логин">
    <input type="password" id="passInput" placeholder="Пароль">
    <button id="loginBtn">Войти</button>
    <div class="error" id="loginError">Неверный логин или пароль</div>
  </div>
</div>

<!-- ═══ Dashboard ═══ -->
<div id="dashScreen">
  <div class="container">
    <div class="topbar">
      <h1>Yan.Pro Админ-панель</h1>
      <button id="logoutBtn">Выйти</button>
    </div>

    <div class="tabs">
      <div class="tab active" data-tab="drivers">Водители</div>
      <div class="tab" data-tab="rides">Поездки</div>
      <div class="tab" data-tab="assists">Заявки помощи</div>
      <div class="tab" data-tab="stats">Статистика</div>
    </div>

    <!-- Drivers tab -->
    <div class="tab-content active" id="tab-drivers">
      <div class="add-form">
        <input type="text" id="newDriverLogin" placeholder="Логин">
        <input type="password" id="newDriverPass" placeholder="Пароль">
        <input type="text" id="newDriverName" placeholder="Имя">
        <select id="newDriverRole"><option value="driver">Водитель</option><option value="mechanic">Мастер</option></select>
        <button id="addDriverBtn">Добавить</button>
      </div>
      <table>
        <thead><tr><th>Логин</th><th>Имя</th><th>Роль</th><th>Статус</th><th></th></tr></thead>
        <tbody id="driversBody"></tbody>
      </table>
    </div>

    <!-- Rides tab -->
    <div class="tab-content" id="tab-rides">
      <table>
        <thead><tr><th>ID</th><th>Пассажир</th><th>Водитель</th><th>Статус</th><th>Время</th></tr></thead>
        <tbody id="ridesBody"></tbody>
      </table>
    </div>

    <!-- Assists tab -->
    <div class="tab-content" id="tab-assists">
      <table>
        <thead><tr><th>ID</th><th>Пассажир</th><th>Авто</th><th>Тип</th><th>Телефон</th><th>Статус</th><th>Время</th></tr></thead>
        <tbody id="assistsBody"></tbody>
      </table>
    </div>

    <!-- Stats tab -->
    <div class="tab-content" id="tab-stats">
      <div class="stats" id="statsGrid"></div>
    </div>
  </div>
</div>

<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
<script>
(function(){
'use strict';

const ADMIN_USER='admin',ADMIN_PASS='12345';
let token=null,socket=null,pollTimer=null;

const $=id=>document.getElementById(id);

// ═══ Login ══════════════════════════════════════════════════════
$('loginBtn').onclick=()=>{
  const u=$('loginInput').value.trim(),p=$('passInput').value.trim();
  if(u===ADMIN_USER&&p===ADMIN_PASS){token=btoa(u+':'+p);showDash()}
  else $('loginError').style.display='block';
};
$('loginInput').addEventListener('keydown',e=>{if(e.key==='Enter')$('passInput').focus()});
$('passInput').addEventListener('keydown',e=>{if(e.key==='Enter')$('loginBtn').click()});

// ═══ Dashboard ══════════════════════════════════════════════════
function showDash(){
  $('loginScreen').style.display='none';
  $('dashScreen').style.display='block';
  connectSocket();
  refresh();
  pollTimer=setInterval(refresh,5000);
}
$('logoutBtn').onclick=()=>{token=null;clearInterval(pollTimer);$('loginScreen').style.display='flex';$('dashScreen').style.display='none'};

// Tabs
document.querySelectorAll('.tab').forEach(t=>{
  t.onclick=()=>{
    document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));
    document.querySelectorAll('.tab-content').forEach(x=>x.classList.remove('active'));
    t.classList.add('active');
    $('tab-'+t.dataset.tab).classList.add('active');
  };
});

// ═══ API ════════════════════════════════════════════════════════
async function api(path,body){
  const opts={headers:{'Authorization':'Basic '+token,'Content-Type':'application/json'}};
  if(body){opts.method='POST';opts.body=JSON.stringify(body)}
  const r=await fetch('/api/admin'+path,opts);
  return r.json();
}

async function refresh(){
  try{
    const d=await api('');
    renderDrivers(d.drivers||[]);
    renderRides(d.rides||[]);
    renderAssists(d.assists||[]);
    renderStats(d);
  }catch(e){}
}

// ═══ Drivers ════════════════════════════════════════════════════
function renderDrivers(list){
  const tb=$('driversBody');tb.innerHTML='';
  list.forEach(d=>{
    const tr=document.createElement('tr');
    const roleLabel=d.role==='mechanic'?'Мастер':'Водитель';
    const roleBadge=d.role==='mechanic'?'badge-red':'badge-green';
    tr.innerHTML=`<td>${esc(d.login||d.socketId?.slice(0,8)||'—')}</td><td>${esc(d.name)}</td><td><span class="badge ${roleBadge}">${roleLabel}</span></td><td><span class="badge ${d.online?'badge-green':'badge-gray'}">${d.online?'Онлайн':'Офлайн'}</span></td><td><button class="del-btn" data-id="${d.socketId||d.login}">Удалить</button></td>`;
    tb.appendChild(tr);
  });
  tb.querySelectorAll('.del-btn').forEach(b=>{
    b.onclick=async()=>{await api('/drivers/'+b.dataset.id+'/delete');refresh()};
  });
}

$('addDriverBtn').onclick=async()=>{
  const login=$('newDriverLogin').value.trim(),pass=$('newDriverPass').value.trim(),name=$('newDriverName').value.trim(),role=$('newDriverRole').value;
  if(!login||!pass)return;
  await api('/drivers',{login,pass,name:name||login,role});
  $('newDriverLogin').value='';$('newDriverPass').value='';$('newDriverName').value='';
  refresh();
};

// ═══ Rides ══════════════════════════════════════════════════════
function renderRides(list){
  const tb=$('ridesBody');tb.innerHTML='';
  if(!list.length){tb.innerHTML='<tr><td colspan="5" style="text-align:center;color:var(--text2)">Нет поездок</td></tr>';return}
  list.slice(-50).reverse().forEach(r=>{
    const statusBadge=r.status==='active'?'badge-green':r.status==='completed'?'badge-blue':'badge-gray';
    const tr=document.createElement('tr');
    tr.innerHTML=`<td>${esc(r.id?.slice(0,16)||'—')}</td><td>${esc(r.passengerId||'—')}</td><td>${esc(r.driverId?.slice(0,8)||'—')}</td><td><span class="badge ${statusBadge}">${r.status||'—'}</span></td><td>${r.time||'—'}</td>`;
    tb.appendChild(tr);
  });
}

// ═══ Assists ════════════════════════════════════════════════════
function renderAssists(list){
  const tb=$('assistsBody');tb.innerHTML='';
  if(!list.length){tb.innerHTML='<tr><td colspan="7" style="text-align:center;color:var(--text2)">Нет заявок</td></tr>';return}
  list.slice(-50).reverse().forEach(a=>{
    const statusBadge=a.status==='active'?'badge-green':a.status==='waiting'?'badge-red':'badge-gray';
    const typeLabel=a.breakdownType==='electrical'?'Электрическая':'Механическая';
    const tr=document.createElement('tr');
    tr.innerHTML=`<td>${esc(a.id?.slice(0,16)||'—')}</td><td>${esc(a.passengerName||'—')}</td><td>${esc(a.carMake||'—')}</td><td>${typeLabel}</td><td>${esc(a.phone||'—')}</td><td><span class="badge ${statusBadge}">${a.status||'—'}</span></td><td>${a.time||'—'}</td>`;
    tb.appendChild(tr);
  });
}

// ═══ Stats ══════════════════════════════════════════════════════
function renderStats(d){
  const g=$('statsGrid');
  const drivers=Array.isArray(d.drivers)?d.drivers:[];
  const online=drivers.filter(x=>x.online).length;
  const mechanics=drivers.filter(x=>x.role==='mechanic').length;
  g.innerHTML=`
    <div class="stat"><div class="num">${drivers.length}</div><div class="lbl">Водителей</div></div>
    <div class="stat"><div class="num" style="color:var(--blue)">${online}</div><div class="lbl">Онлайн</div></div>
    <div class="stat"><div class="num" style="color:var(--red)">${mechanics}</div><div class="lbl">Мастеров</div></div>
    <div class="stat"><div class="num">${d.rides?.length||0}</div><div class="lbl">Поездок</div></div>
    <div class="stat"><div class="num">${d.assists?.length||0}</div><div class="lbl">Заявок помощи</div></div>
  `;
}

// ═══ Socket (live updates) ══════════════════════════════════════
function connectSocket(){
  socket=io(location.origin);
  socket.on('connect',()=>console.log('admin connected'));
  socket.on('passenger:waiting',()=>refresh());
  socket.on('ride:accepted',()=>refresh());
  socket.on('ride:finished',()=>refresh());
  socket.on('assistance:waiting',()=>refresh());
  socket.on('assistance:accepted',()=>refresh());
  socket.on('assistance:finished',()=>refresh());
}

function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}

})();
</script>
</body>
</html>
