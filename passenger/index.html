<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#121212">
<title>Помощь на дороге</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔧</text></svg>">
<link rel="stylesheet" href="https://unpkg.com/maplibre-gl@4.1.1/dist/maplibre-gl.css">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#121212;--card:#1E1E1E;--card2:#2A2A2A;--green:#00C853;--red:#F44336;--text:#FFFFFF;--text2:#AAAAAA;--border:#333333;--radius:12px}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text);height:100dvh;overflow:hidden;position:relative}
.screen{position:absolute;inset:0;display:flex;flex-direction:column;transition:opacity .3s,transform .3s;z-index:10}
.screen.hidden{opacity:0;pointer-events:none;transform:translateY(20px)}
.screen-inner{flex:1;display:flex;flex-direction:column;padding:20px;overflow-y:auto}

/* Welcome */
#welcome .logo{font-size:48px;text-align:center;margin:40px 0 8px}
#welcome .brand{text-align:center;font-size:22px;font-weight:700;margin-bottom:40px;color:var(--red)}
#welcome label{font-size:13px;color:var(--text2);margin-bottom:6px;display:block}
#welcome input{width:100%;padding:14px 16px;background:var(--card2);border:1px solid var(--border);border-radius:var(--radius);color:var(--text);font-size:16px;outline:none}
#welcome input:focus{border-color:var(--red)}
#welcome .btn{margin-top:24px;width:100%;padding:16px;background:var(--red);color:#fff;border:none;border-radius:var(--radius);font-size:17px;font-weight:700;cursor:pointer}
#welcome .btn:active{opacity:.85}

/* Request (hidden, but we reuse mapScreen for the whole flow) */
#request{display:none}

/* Map screen */
#mapScreen{z-index:1}
#mapContainer{position:absolute;inset:0}
.status-bar{position:absolute;top:0;left:0;right:0;padding:12px 16px;background:linear-gradient(180deg,rgba(18,18,18,.95),rgba(18,18,18,0));z-index:20}
.status-chip{display:inline-flex;align-items:center;gap:8px;padding:8px 14px;background:var(--card);border-radius:20px;font-size:14px;font-weight:600}
.status-chip .dot{width:10px;height:10px;border-radius:50%}
.status-chip .dot.searching{background:var(--red);animation:pulse 1.5s infinite}
.status-chip .dot.found{background:var(--green)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

.cancel-btn{position:absolute;bottom:24px;left:16px;padding:12px 20px;background:rgba(30,30,30,.9);border:1px solid var(--red);border-radius:var(--radius);color:var(--red);font-size:14px;font-weight:600;z-index:20;cursor:pointer;backdrop-filter:blur(8px)}
.cancel-btn:active{background:rgba(244,67,54,.2)}

/* Chat */
.chat-fab{position:absolute;bottom:24px;right:16px;width:56px;height:56px;border-radius:50%;background:var(--red);border:none;color:#fff;font-size:24px;box-shadow:0 4px 12px rgba(244,67,54,.4);z-index:20;cursor:pointer;display:none}
.chat-fab:active{transform:scale(.95)}
.chat-fab .badge{position:absolute;top:-2px;right:-2px;width:20px;height:20px;border-radius:50%;background:#fff;color:var(--red);font-size:11px;display:flex;align-items:center;justify-content:center;font-weight:700}

#chatModal{position:absolute;inset:0;background:var(--bg);z-index:100;display:flex;flex-direction:column;transform:translateY(100%);transition:transform .3s}
#chatModal.open{transform:translateY(0)}
.chat-header{display:flex;align-items:center;gap:12px;padding:14px 16px;background:var(--card);border-bottom:1px solid var(--border)}
.chat-header .back{background:none;border:none;color:var(--text);font-size:20px;cursor:pointer;padding:4px}
.chat-header .title{font-size:16px;font-weight:600;flex:1}
.chat-messages{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:8px}
.chat-msg{max-width:80%;padding:10px 14px;border-radius:16px;font-size:14px;line-height:1.4}
.chat-msg.driver{align-self:flex-start;background:var(--card2);border-bottom-left-radius:4px}
.chat-msg.passenger{align-self:flex-end;background:var(--red);border-bottom-right-radius:4px}
.chat-input-bar{display:flex;gap:8px;padding:12px 16px;background:var(--card);border-top:1px solid var(--border)}
.chat-input-bar input{flex:1;padding:12px 14px;background:var(--card2);border:1px solid var(--border);border-radius:20px;color:var(--text);font-size:15px;outline:none}
.chat-input-bar input:focus{border-color:var(--red)}
.chat-input-bar button{padding:12px 20px;background:var(--red);border:none;border-radius:20px;color:#fff;font-size:15px;font-weight:600;cursor:pointer}
.chat-input-bar button:active{opacity:.85}

/* Overlay */
#waitingOverlay{position:absolute;inset:0;background:rgba(18,18,18,.95);z-index:200;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;display:none}
#waitingOverlay .icon{font-size:64px}
#waitingOverlay .text{font-size:20px;font-weight:700}
#waitingOverlay .sub{font-size:14px;color:var(--text2);text-align:center;padding:0 20px}
#waitingOverlay .btn{margin-top:24px;padding:14px 40px;background:var(--red);border:none;border-radius:var(--radius);color:#fff;font-size:16px;font-weight:700;cursor:pointer}

/* Info card */
.info-card{position:absolute;bottom:80px;left:16px;right:16px;background:var(--card);border-radius:var(--radius);padding:16px;z-index:20;display:none}
.info-card .row{display:flex;justify-content:space-between;font-size:14px;margin-bottom:6px}
.info-card .label{color:var(--text2)}
.info-card .value{font-weight:600}
</style>
</head>
<body>

<!-- Screen: Welcome + form -->
<div id="welcome" class="screen">
  <div class="screen-inner">
    <div class="logo">🔧</div>
    <div class="brand">Помощь на дороге</div>

    <label for="nameInput">Как вас зовут?</label>
    <input type="text" id="nameInput" placeholder="Имя" autocomplete="name">

    <label style="margin-top:16px" for="phoneInput">Телефон</label>
    <input type="tel" id="phoneInput" placeholder="+7 (999) 123-45-67" autocomplete="tel">

    <label style="margin-top:16px" for="carMakeInput">Марка и модель автомобиля</label>
    <input type="text" id="carMakeInput" placeholder="Например: Toyota Camry">

    <label style="margin-top:16px">Тип неисправности</label>
    <div class="type-toggle" style="display:flex;gap:10px;margin-bottom:16px">
      <div class="type-btn" id="typeElectrical" style="flex:1;padding:14px;background:var(--card2);border:2px solid var(--border);border-radius:var(--radius);color:var(--text2);font-size:15px;font-weight:600;text-align:center;cursor:pointer">Электрическая</div>
      <div class="type-btn" id="typeMechanical" style="flex:1;padding:14px;background:var(--card2);border:2px solid var(--border);border-radius:var(--radius);color:var(--text2);font-size:15px;font-weight:600;text-align:center;cursor:pointer">Механическая</div>
    </div>

    <label for="descInput">Описание неисправности</label>
    <textarea id="descInput" rows="3" placeholder="Опишите проблему..." style="width:100%;padding:14px 16px;background:var(--card2);border:1px solid var(--border);border-radius:var(--radius);color:var(--text);font-size:15px;outline:none;resize:none;font-family:inherit"></textarea>

    <button class="btn" id="submitBtn" disabled style="margin-top:auto">Найти мастера</button>
  </div>
</div>

<!-- Screen: Map + waiting -->
<div id="mapScreen" class="screen hidden">
  <div id="mapContainer"></div>

  <div class="status-bar">
    <div class="status-chip">
      <span class="dot searching"></span>
      <span id="statusText">Ищем мастера...</span>
    </div>
  </div>

  <div class="info-card" id="infoCard">
    <div class="row"><span class="label">Автомобиль</span><span class="value" id="infoCar">—</span></div>
    <div class="row"><span class="label">Неисправность</span><span class="value" id="infoType">—</span></div>
    <div class="row"><span class="label">Телефон</span><span class="value" id="infoPhone">—</span></div>
  </div>

  <button class="cancel-btn" id="cancelBtn">Отменить</button>

  <button class="chat-fab" id="chatFab">
    💬
    <span class="badge" id="chatBadge" style="display:none">0</span>
  </button>

  <div id="chatModal">
    <div class="chat-header">
      <button class="back" id="chatBack">←</button>
      <span class="title">Чат с мастером</span>
    </div>
    <div class="chat-messages" id="chatMessages"></div>
    <div class="chat-input-bar">
      <input type="text" id="chatInput" placeholder="Сообщение...">
      <button id="chatSendBtn">→</button>
    </div>
  </div>

  <div id="waitingOverlay">
    <div class="icon">✅</div>
    <div class="text" id="overlayText">Помощь завершена</div>
    <div class="sub" id="overlaySub"></div>
    <button class="btn" id="doneBtn">Готово</button>
  </div>
</div>

<script src="https://unpkg.com/maplibre-gl@4.1.1/dist/maplibre-gl.js"></script>
<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
<script>
(function() {
  'use strict';

  const SERVER_URL = location.origin;
  const GEOCODER_URL = 'https://nominatim.openstreetmap.org';
  const MAP_STYLE = 'https://tiles.openfreemap.org/styles/liberty';

  let socket = null;
  let map = null;
  let passengerName = '';
  let phone = '';
  let carMake = '';
  let description = '';
  let breakdownType = null;
  let myLat = null, myLon = null;
  let driverLat = null, driverLon = null;
  let assistId = null;
  let watchId = null;
  let unreadMessages = 0;
  let isChatOpen = false;

  const $ = id => document.getElementById(id);

  function showScreen(id) {
    document.querySelectorAll('.screen').forEach(s => s.classList.add('hidden'));
    $(id).classList.remove('hidden');
  }

  // ─── Form logic ──────────────────────────────────────────────
  $('typeElectrical').onclick = () => {
    breakdownType = 'electrical';
    $('typeElectrical').style.borderColor = 'var(--red)'; $('typeElectrical').style.color = 'var(--red)'; $('typeElectrical').style.background = 'rgba(244,67,54,.1)';
    $('typeMechanical').style.borderColor = 'var(--border)'; $('typeMechanical').style.color = 'var(--text2)'; $('typeMechanical').style.background = 'var(--card2)';
    updateBtn();
  };
  $('typeMechanical').onclick = () => {
    breakdownType = 'mechanical';
    $('typeMechanical').style.borderColor = 'var(--red)'; $('typeMechanical').style.color = 'var(--red)'; $('typeMechanical').style.background = 'rgba(244,67,54,.1)';
    $('typeElectrical').style.borderColor = 'var(--border)'; $('typeElectrical').style.color = 'var(--text2)'; $('typeElectrical').style.background = 'var(--card2)';
    updateBtn();
  };

  ['nameInput','phoneInput','carMakeInput'].forEach(id => $(id).addEventListener('input', updateBtn));
  $('descInput').addEventListener('input', updateBtn);

  function updateBtn() {
    const ok = $('nameInput').value.trim() && $('phoneInput').value.trim() && $('carMakeInput').value.trim() && breakdownType;
    $('submitBtn').disabled = !ok;
  }

  $('submitBtn').onclick = () => {
    passengerName = $('nameInput').value.trim();
    phone = $('phoneInput').value.trim();
    carMake = $('carMakeInput').value.trim();
    description = $('descInput').value.trim();
    if (!passengerName || !phone || !carMake || !breakdownType) return;
    showScreen('mapScreen');
    startGeolocationAndConnect();
  };

  // ─── Geolocation ────────────────────────────────────────────
  function startGeolocationAndConnect() {
    if (!navigator.geolocation) { connectAndRequest(); return; }
    navigator.geolocation.getCurrentPosition(
      pos => { myLat = pos.coords.latitude; myLon = pos.coords.longitude; connectAndRequest(); },
      () => connectAndRequest(),
      { enableHighAccuracy: true, timeout: 10000 }
    );
  }

  // ─── Socket ─────────────────────────────────────────────────
  function connectAndRequest() {
    socket = io(SERVER_URL, { reconnection: true, reconnectionDelay: 2000 });

    socket.on('connect', () => {
      socket.emit('passenger:register', { name: passengerName });
      socket.emit('assistance:request', {
        passengerName,
        phone,
        carMake,
        breakdownType,
        description,
        pickup: { lat: myLat || 0, lon: myLon || 0 }
      });
      initMap();
      $('infoCar').textContent = carMake;
      $('infoType').textContent = breakdownType === 'electrical' ? 'Электрическая' : 'Механическая';
      $('infoPhone').textContent = phone;
      $('infoCard').style.display = 'block';
    });

    socket.on('assistance:accepted', data => {
      assistId = data.assistId;
      $('statusText').textContent = 'Мастер в пути!';
      document.querySelector('.status-chip .dot').className = 'dot found';
      $('cancelBtn').style.display = 'none';
      $('chatFab').style.display = 'flex';
    });

    socket.on('assistance:driver_location', data => {
      driverLat = data.lat; driverLon = data.lon;
      updateDriverMarker();
    });

    socket.on('chat:message', data => {
      addChatMsg(data.from === 'driver' ? 'Мастер' : 'Вы', data.text, data.from === 'driver');
      if (!isChatOpen && data.from === 'driver') {
        unreadMessages++; $('chatBadge').textContent = unreadMessages; $('chatBadge').style.display = 'flex';
      }
    });

    socket.on('assistance:cancelled', () => { hideAll(); });
    socket.on('assistance:finished', () => { showDone('Помощь завершена', 'Спасибо! Мастер завершил работу.'); });
    socket.on('assistance:driver_disconnected', () => { showDone('Мастер отключился', 'Попробуйте вызвать снова.'); });
    socket.on('disconnect', () => { $('statusText').textContent = 'Переподключение...'; });
  }

  // ─── Map ────────────────────────────────────────────────────
  let passengerMarker = null, driverMarker = null;

  function initMap() {
    if (map) return;
    map = new maplibregl.Map({ container: 'mapContainer', style: MAP_STYLE, center: [myLon || 37.6, myLat || 55.7], zoom: 15, attributionControl: false });
    map.addControl(new maplibregl.NavigationControl({ showCompass: false }), 'top-right');
    map.on('load', () => {
      const pEl = createDot('#2979FF');
      passengerMarker = new maplibregl.Marker({ element: pEl }).setLngLat([myLon || 37.6, myLat || 55.7]).addTo(map);
      const dEl = createDot('#00C853'); dEl.style.display = 'none';
      driverMarker = new maplibregl.Marker({ element: dEl }).setLngLat([myLon || 37.6, myLat || 55.7]).addTo(map);
    });
    watchId = navigator.geolocation.watchPosition(pos => {
      myLat = pos.coords.latitude; myLon = pos.coords.longitude;
      if (passengerMarker) passengerMarker.setLngLat([myLon, myLat]);
    }, () => {}, { enableHighAccuracy: true, maximumAge: 5000, timeout: 10000 });
  }

  function createDot(color) {
    const el = document.createElement('div');
    el.style.cssText = `width:20px;height:20px;border-radius:50%;background:${color};border:3px solid #fff;box-shadow:0 2px 8px rgba(0,0,0,.4);`;
    return el;
  }

  function updateDriverMarker() {
    if (!map || !driverMarker || !driverLat) return;
    driverMarker.setLngLat([driverLon, driverLat]);
    driverMarker.getElement().style.display = 'block';
    const bounds = new maplibregl.LngLatBounds();
    bounds.extend([myLon, myLat]); bounds.extend([driverLon, driverLat]);
    map.fitBounds(bounds, { padding: 80, maxZoom: 15 });
  }

  // ─── Cancel ─────────────────────────────────────────────────
  $('cancelBtn').onclick = () => {
    if (assistId && socket) socket.emit('assistance:cancel', { assistId });
    hideAll();
  };

  function hideAll() {
    if (watchId) navigator.geolocation.clearWatch(watchId);
    if (socket) { socket.disconnect(); socket = null; }
    assistId = null; driverLat = null; driverLon = null; isChatOpen = false; unreadMessages = 0;
    $('chatMessages').innerHTML = ''; $('chatBadge').style.display = 'none';
    $('chatModal').classList.remove('open'); $('chatFab').style.display = 'none';
    $('infoCard').style.display = 'none'; $('waitingOverlay').style.display = 'none';
    if (driverMarker) driverMarker.getElement().style.display = 'none';
    $('statusText').textContent = 'Ищем мастера...';
    document.querySelector('.status-chip .dot').className = 'dot searching';
    $('cancelBtn').style.display = 'block';
    if (map) { map.remove(); map = null; passengerMarker = null; driverMarker = null; }
    showScreen('welcome');
  }

  function showDone(text, sub) {
    $('overlayText').textContent = text;
    $('overlaySub').textContent = sub;
    $('waitingOverlay').style.display = 'flex';
  }

  $('doneBtn').onclick = () => { hideAll(); };

  // ─── Chat ───────────────────────────────────────────────────
  $('chatFab').onclick = () => { isChatOpen = true; unreadMessages = 0; $('chatBadge').style.display = 'none'; $('chatModal').classList.add('open'); $('chatInput').focus(); };
  $('chatBack').onclick = () => { isChatOpen = false; $('chatModal').classList.remove('open'); };

  function addChatMsg(from, text, isDriver) {
    const div = document.createElement('div');
    div.className = 'chat-msg ' + (isDriver ? 'driver' : 'passenger');
    if (isDriver) div.innerHTML = `<div class="from">${from}</div>${escapeHtml(text)}`;
    else div.textContent = text;
    $('chatMessages').appendChild(div);
    $('chatMessages').scrollTop = $('chatMessages').scrollHeight;
  }

  $('chatSendBtn').onclick = sendChat;
  $('chatInput').addEventListener('keydown', e => { if (e.key === 'Enter') sendChat(); });

  function sendChat() {
    const text = $('chatInput').value.trim();
    if (!text || !socket) return;
    socket.emit('chat:message', { text });
    addChatMsg('Вы', text, false);
    $('chatInput').value = '';
  }

  function escapeHtml(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
})();
</script>
</body>
</html>
